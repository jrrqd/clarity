name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: PYTHONPYCACHEPREFIX=/tmp/clarity-pycache python -m py_compile server.py
      - run: node --check src/app.js
      - run: |
          python server.py &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          sleep 2
          curl --fail http://127.0.0.1:4173/api/status
